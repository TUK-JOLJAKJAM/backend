services:
  proxy:
    image: caddy:2.11.4-alpine
    container_name: refit-caddy
    ports:
      - "80:80"
    volumes:
      - ./caddy:/etc/caddy:ro
      - ./frontend:/srv:ro
    depends_on:
      - app
      - ai
    restart: always
    networks:
      - refit-net

  app:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}:${APP_IMAGE_TAG}
    container_name: refit-app
    environment:
      SPRING_PROFILES_ACTIVE: prod

      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      JWT_SECRET: ${JWT_SECRET}
      # Spring uses the same internal Caddy route that is exercised by the
      # deployment smoke test. Caddy strips /ai and proxies to Uvicorn.
      AI_BASE_URL: ${AI_BASE_URL:-http://proxy/ai}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://43.200.20.216,http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      - mysql
      - redis
      - ai
    restart: always
    networks:
      - refit-net

  ai:
    image: ghcr.io/${GHCR_OWNER}/refit-ai-server:${AI_IMAGE_TAG}
    container_name: refit-ai
    environment:
      PORT: 8000
      CORS_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://43.200.20.216,http://localhost:3000,http://127.0.0.1:3000}
      REFIT_LOG_RAW_DATA: "false"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: always
    networks:
      - refit-net

  mysql:
    image: mysql:8.4
    container_name: refit-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --default-time-zone=+09:00
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    networks:
      - refit-net

  redis:
    image: redis:7.4-alpine
    container_name: refit-redis
    command: ["redis-server","--appendonly","yes"]
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - refit-net

volumes:
  mysql_data:
  redis_data:

networks:
  refit-net:
