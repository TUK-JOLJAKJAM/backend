services:
  nginx:
    image: nginx:1.27-alpine
    container_name: refit-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: always
    networks:
      - refit-net

  app:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}:${APP_IMAGE_TAG}
    container_name: refit-app
    environment:
      SPRING_PROFILES_ACTIVE: prod

      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mysql
      - redis
    restart: always
    networks:
      - refit-net

  mysql:
    image: mysql:8.4
    container_name: refit-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --default-time-zone=+09:00
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    networks:
      - refit-net

  redis:
    image: redis:7.4-alpine
    container_name: refit-redis
    command: ["redis-server","--appendonly","yes"]
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - refit-net

volumes:
  mysql_data:
  redis_data:

networks:
  refit-net: