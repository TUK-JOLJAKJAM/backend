name: ci-cd-lightsail

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 백엔드 체크아웃
        uses: actions/checkout@v5

      - name: AI 서버 체크아웃
        uses: actions/checkout@v5
        with:
          repository: TUK-JOLJAKJAM/refit-ai-server
          ref: main
          path: refit-ai-server

      - name: 프론트엔드 체크아웃
        uses: actions/checkout@v5
        with:
          repository: TUK-JOLJAKJAM/front-end
          ref: main
          path: front-end

      - name: 이미지 경로 소문자 생성
        run: |
          echo "GHCR_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
          echo "GHCR_REPO_LC=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "AI_IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/refit-ai-server" >> "$GITHUB_ENV"
          echo "AI_COMMIT_SHA=$(git -C refit-ai-server rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: JDK 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: refit-ai-server/requirements.txt

      - name: Node.js 설정
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: AI 서버 테스트
        working-directory: refit-ai-server
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pytest -q

      - name: React 테스트와 HTTP 데모 빌드
        working-directory: front-end
        env:
          CI: "true"
          PUBLIC_URL: http://${{ secrets.LIGHTSAIL_HOST }}
          REACT_APP_AI_API_URL: http://${{ secrets.LIGHTSAIL_HOST }}/ai
          REACT_APP_BACKEND_API_URL: http://${{ secrets.LIGHTSAIL_HOST }}
        run: |
          npm ci
          npm test -- --watchAll=false
          npm run build
          grep --recursive --quiet 'HTTP 데모 모드' build/static/js
          grep --recursive --quiet 'http://${{ secrets.LIGHTSAIL_HOST }}/ai' build/static/js

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ env.GHCR_OWNER_LC }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 백엔드 이미지 빌드·푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: AI 서버 이미지 빌드·푸시
        uses: docker/build-push-action@v6
        with:
          context: ./refit-ai-server
          file: ./refit-ai-server/Dockerfile
          push: true
          tags: |
            ${{ env.AI_IMAGE_NAME }}:${{ env.AI_COMMIT_SHA }}
            ${{ env.AI_IMAGE_NAME }}:latest

      - name: React·AI 이미지와 Caddy 통합 테스트
        run: |
          set -euo pipefail

          cleanup() {
            docker rm --force refit-ci-caddy refit-ci-ai > /dev/null 2>&1 || true
            docker network rm refit-ci > /dev/null 2>&1 || true
          }

          diagnostics() {
            docker logs refit-ci-ai || true
            docker logs refit-ci-caddy || true
          }

          trap diagnostics ERR
          trap cleanup EXIT
          cleanup

          docker pull "${AI_IMAGE_NAME}:${AI_COMMIT_SHA}"
          docker network create refit-ci
          docker run --detach --network refit-ci --name refit-ci-ai \
            --network-alias ai "${AI_IMAGE_NAME}:${AI_COMMIT_SHA}"
          docker run --detach --network refit-ci --name refit-ci-caddy \
            --publish 18080:80 \
            --volume "${GITHUB_WORKSPACE}/caddy:/etc/caddy:ro" \
            --volume "${GITHUB_WORKSPACE}/front-end/build:/srv:ro" \
            caddy:2.11.4-alpine

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://localhost:18080/ai/health > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "React·AI HTTP 통합 테스트가 60초 안에 준비되지 않았습니다."
              diagnostics
              exit 1
            fi
            sleep 2
          done

          curl --fail --silent --show-error http://localhost:18080/ | \
            grep --quiet '<title>ReFit Analysis</title>'
          analysis_response="$(curl --fail --silent --show-error \
            --request POST \
            --header 'Content-Type: application/json' \
            --data '{"history_id":"image-http-demo"}' \
            http://localhost:18080/ai/api/v1/analyze_session)"
          printf '%s' "$analysis_response" | grep --quiet '"history_id":"image-http-demo"'

      - name: SSH 키 설정
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: 서버에 배포 파일 업로드
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
            "mkdir -p ~/refit/caddy ~/refit/frontend"
          scp -o StrictHostKeyChecking=no docker-compose.prod.yml \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/refit/docker-compose.prod.yml
          scp -o StrictHostKeyChecking=no caddy/Caddyfile \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/refit/caddy/Caddyfile
          scp -o StrictHostKeyChecking=no -r front-end/build/. \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/refit/frontend/

      - name: 서버 환경 파일 생성
        run: |
          cat > .env <<EOF
          GHCR_OWNER=${{ env.GHCR_OWNER_LC }}
          GHCR_REPO=${{ env.GHCR_REPO_LC }}
          APP_IMAGE_TAG=${{ github.sha }}
          AI_IMAGE_TAG=${{ env.AI_COMMIT_SHA }}
          CORS_ALLOWED_ORIGINS=http://${{ secrets.LIGHTSAIL_HOST }},http://localhost:3000,http://127.0.0.1:3000
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}
          EOF
          scp -o StrictHostKeyChecking=no .env \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/refit/.env

      - name: 서버에서 서비스 갱신
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} 'bash -se' <<'REMOTE'
            set -euo pipefail
            cd ~/refit

            compose() {
              docker compose --env-file .env -f docker-compose.prod.yml "$@"
            }

            diagnostics() {
              echo "배포 진단 정보"
              compose ps || true
              compose logs --tail=120 app ai proxy || true
            }
            trap diagnostics ERR

            chmod 600 .env
            docker login ghcr.io \
              -u "$(grep -E '^GHCR_OWNER=' .env | cut -d= -f2)" \
              -p "$(grep -E '^GHCR_TOKEN=' .env | cut -d= -f2)"

            compose pull
            compose up -d --remove-orphans

            for attempt in $(seq 1 30); do
              health_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' refit-ai)"
              echo "AI health=$health_status attempt=$attempt"
              [ "$health_status" = "healthy" ] && break
              if [ "$health_status" = "unhealthy" ] || [ "$attempt" -eq 30 ]; then
                exit 1
              fi
              sleep 5
            done

            compose exec -T proxy caddy validate --config /etc/caddy/Caddyfile
            trap - ERR
            docker image prune -f
          REMOTE

      - name: Caddy 컨테이너 강제 재생성
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
            "cd ~/refit && docker compose --env-file .env -f docker-compose.prod.yml up -d --force-recreate --no-deps proxy"

      - name: 서버 내부 HTTP 연결 검증
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} 'bash -se' <<'REMOTE'
            set -euo pipefail
            cd ~/refit

            compose() {
              docker compose --env-file .env -f docker-compose.prod.yml "$@"
            }

            diagnostics() {
              compose ps || true
              compose logs --tail=120 app ai proxy || true
            }
            trap diagnostics ERR

            compose ps
            docker exec refit-caddy caddy validate --config /etc/caddy/Caddyfile
            docker exec refit-ai python -c \
              "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"

            for attempt in $(seq 1 60); do
              if curl --fail --silent --output /dev/null http://127.0.0.1/v3/api-docs; then
                echo "Spring API ready attempt=$attempt"
                break
              fi
              if [ "$attempt" -eq 60 ]; then
                echo "Spring API가 120초 안에 준비되지 않았습니다."
                exit 1
              fi
              sleep 2
            done

            curl --fail --silent --show-error http://127.0.0.1/ | \
              grep --quiet '<title>ReFit Analysis</title>'
            curl --fail --silent --show-error http://127.0.0.1/v3/api-docs > /dev/null
            curl --fail --silent --show-error http://127.0.0.1/ai/health > /dev/null
            analysis_response="$(curl --fail --silent --show-error \
              --request POST \
              --header 'Content-Type: application/json' \
              --data '{"history_id":"deployment-http-demo"}' \
              http://127.0.0.1/ai/api/v1/analyze_session)"
            printf '%s' "$analysis_response" | grep --quiet '"history_id":"deployment-http-demo"'
            trap - ERR
          REMOTE

      - name: 외부 공개 HTTP 데모 스모크 테스트
        run: |
          set -euo pipefail
          base_url="http://${{ secrets.LIGHTSAIL_HOST }}"

          index_html="$(curl --fail --silent --show-error --retry 10 --retry-all-errors --retry-delay 3 \
            "$base_url/")"
          printf '%s' "$index_html" | grep --quiet '<title>ReFit Analysis</title>'

          curl --fail --silent --show-error --retry 10 --retry-all-errors --retry-delay 3 \
            "$base_url/v3/api-docs" > /dev/null
          curl --fail --silent --show-error --retry 10 --retry-all-errors --retry-delay 3 \
            "$base_url/ai/health" > /dev/null

          analysis_response="$(curl --fail --silent --show-error --retry 10 --retry-all-errors --retry-delay 3 \
            --request POST \
            --header 'Content-Type: application/json' \
            --data '{"history_id":"external-http-demo"}' \
            "$base_url/ai/api/v1/analyze_session")"
          printf '%s' "$analysis_response" | grep --quiet '"history_id":"external-http-demo"'

          response_headers="$(curl --fail --silent --show-error --dump-header - --output /dev/null \
            "$base_url/ai/health")"
          printf '%s' "$response_headers" | tr -d '\r' | \
            grep --ignore-case --quiet '^x-content-type-options: nosniff$'
