name: ci-cd-lightsail

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 이미지 경로 소문자 생성
        run: |
          echo "GHCR_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "GHCR_REPO_LC=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: JDK 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ env.GHCR_OWNER_LC }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 도커 이미지 빌드/푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: SSH 키 설정
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: 서버에 배포 파일 업로드
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} "mkdir -p ~/refit/nginx"
          scp -o StrictHostKeyChecking=no docker-compose.prod.yml ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/refit/docker-compose.prod.yml
          scp -o StrictHostKeyChecking=no nginx/default.conf ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/refit/nginx/default.conf

      - name: 서버에서 compose 재기동
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} 'bash -se' <<'REMOTE'
            set -euo pipefail
            cd ~/refit

            cat > .env <<EOF
            GHCR_OWNER=${GHCR_OWNER}
            GHCR_REPO=${GHCR_REPO}
            APP_IMAGE_TAG=${GITHUB_SHA}
            JWT_SECRET=${JWT_SECRET}
            JWT_ACCESS_EXP_SECONDS=3600
            MYSQL_DATABASE=${MYSQL_DATABASE}
            MYSQL_USER=${MYSQL_USER}
            MYSQL_PASSWORD=${MYSQL_PASSWORD}
            MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
            EOF

            chmod 600 .env

            docker login ghcr.io -u "${GHCR_OWNER}" -p "${GHCR_TOKEN}"

            docker compose --env-file .env -f docker-compose.prod.yml pull
            docker compose --env-file .env -f docker-compose.prod.yml up -d

            docker image prune -f
          REMOTE
        env:
          GHCR_OWNER: ${{ env.GHCR_OWNER_LC }}
          GHCR_REPO: ${{ env.GHCR_REPO_LC }}
          GITHUB_SHA: ${{ github.sha }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}