name: ci-cd-lightsail

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: AI 서버 체크아웃
        uses: actions/checkout@v4
        with:
          repository: TUK-JOLJAKJAM/refit-ai-server
          ref: main
          path: refit-ai-server

      - name: 이미지 경로 소문자 생성
        run: |
          echo "GHCR_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "GHCR_REPO_LC=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "AI_IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/refit-ai-server" >> $GITHUB_ENV
          echo "AI_COMMIT_SHA=$(git -C refit-ai-server rev-parse HEAD)" >> $GITHUB_ENV

      - name: JDK 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: refit-ai-server/requirements.txt

      - name: AI 서버 테스트
        working-directory: refit-ai-server
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pytest -q

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ env.GHCR_OWNER_LC }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 도커 이미지 빌드/푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: AI 서버 이미지 빌드/푸시
        uses: docker/build-push-action@v6
        with:
          context: ./refit-ai-server
          file: ./refit-ai-server/Dockerfile
          push: true
          tags: |
            ${{ env.AI_IMAGE_NAME }}:${{ env.AI_COMMIT_SHA }}
            ${{ env.AI_IMAGE_NAME }}:latest

      - name: AI 이미지와 Caddy 통합 테스트
        run: |
          set -euo pipefail

          cleanup() {
            docker rm --force refit-ci-caddy refit-ci-ai > /dev/null 2>&1 || true
            docker network rm refit-ci > /dev/null 2>&1 || true
          }

          diagnostics() {
            docker logs refit-ci-ai || true
            docker logs refit-ci-caddy || true
          }

          trap diagnostics ERR
          trap cleanup EXIT
          cleanup

          docker pull "${AI_IMAGE_NAME}:${AI_COMMIT_SHA}"
          docker network create refit-ci
          docker run --detach --network refit-ci --name refit-ci-ai \
            --network-alias ai "${AI_IMAGE_NAME}:${AI_COMMIT_SHA}"
          docker run --detach --network refit-ci --name refit-ci-caddy \
            --env PUBLIC_HOST=http://localhost \
            --publish 18080:80 \
            --volume "${GITHUB_WORKSPACE}/caddy:/etc/caddy:ro" \
            caddy:2.11.4-alpine

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://localhost:18080/ai/health > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "AI 프록시 health check가 60초 안에 성공하지 않았습니다."
              curl --silent --show-error --include http://localhost:18080/ai/health || true
              diagnostics
              exit 1
            fi
            sleep 2
          done

          analysis_response="$(curl --fail --silent --show-error \
            --request POST \
            --header 'Content-Type: application/json' \
            --data '{"history_id":"image-integration-smoke"}' \
            http://localhost:18080/ai/api/v1/analyze_session)"
          printf '%s' "$analysis_response" | grep --quiet '"history_id":"image-integration-smoke"'

      - name: SSH 키 설정
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: 서버에 배포 파일 업로드
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} "mkdir -p ~/refit/caddy"
          scp -o StrictHostKeyChecking=no docker-compose.prod.yml ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/refit/docker-compose.prod.yml
          scp -o StrictHostKeyChecking=no caddy/Caddyfile ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/refit/caddy/Caddyfile

      - name: .env 생성
        run: |
          cat > .env <<EOF
          GHCR_OWNER=${{ env.GHCR_OWNER_LC }}
          GHCR_REPO=${{ env.GHCR_REPO_LC }}
          APP_IMAGE_TAG=${{ github.sha }}
          AI_IMAGE_TAG=${{ env.AI_COMMIT_SHA }}
          PUBLIC_HOST=${{ secrets.LIGHTSAIL_HOST }}.sslip.io
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}
          EOF

      - name: 서버로 .env 업로드
        run: |
          scp -o StrictHostKeyChecking=no .env ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/refit/.env

      - name: 서버에서 서비스 갱신
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} 'bash -se' <<'REMOTE'
            set -euo pipefail
            cd ~/refit

            compose() {
              docker compose --env-file .env -f docker-compose.prod.yml "$@"
            }

            diagnostics() {
              echo "배포 진단 정보"
              compose ps || true
              compose logs --tail=120 ai proxy || true
            }

            trap diagnostics ERR

            chmod 600 .env

            docker login ghcr.io -u "$(grep -E '^GHCR_OWNER=' .env | cut -d= -f2)" -p "$(grep -E '^GHCR_TOKEN=' .env | cut -d= -f2)"

            compose pull
            docker rm --force refit-nginx > /dev/null 2>&1 || true
            compose up -d --remove-orphans

            echo "AI 컨테이너 자체 healthcheck 대기"
            for attempt in $(seq 1 30); do
              health_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' refit-ai)"
              echo "AI health=$health_status attempt=$attempt"

              if [ "$health_status" = "healthy" ]; then
                break
              fi

              if [ "$health_status" = "unhealthy" ] || [ "$attempt" -eq 30 ]; then
                exit 1
              fi

              sleep 5
            done

            echo "Caddy 설정 문법 검증"
            compose exec -T proxy caddy validate --config /etc/caddy/Caddyfile

            trap - ERR
            docker image prune -f
          REMOTE

      - name: Caddy 컨테이너 강제 재생성
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
            "cd ~/refit && docker compose --env-file .env -f docker-compose.prod.yml up -d --force-recreate --no-deps proxy"

      - name: 원격 컨테이너와 내부 연결 검증
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} 'bash -se' <<'REMOTE'
            set -euo pipefail
            cd ~/refit

            compose() {
              docker compose --env-file .env -f docker-compose.prod.yml "$@"
            }

            diagnostics() {
              compose ps || true
              compose logs --tail=120 ai proxy || true
            }
            trap diagnostics ERR

            compose ps
            docker exec refit-caddy caddy validate --config /etc/caddy/Caddyfile
            docker exec refit-ai python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"

            public_host="$(grep -E '^PUBLIC_HOST=' .env | cut -d= -f2-)"
            curl --fail --silent --show-error --retry 20 --retry-all-errors --retry-delay 3 \
              --resolve "$public_host:443:127.0.0.1" "https://$public_host/v3/api-docs" > /dev/null
            curl --fail --silent --show-error \
              --resolve "$public_host:443:127.0.0.1" "https://$public_host/ai/health" > /dev/null
            analysis_response="$(curl --fail --silent --show-error \
              --resolve "$public_host:443:127.0.0.1" \
              --request POST \
              --header 'Content-Type: application/json' \
              --data '{"history_id":"deployment-smoke"}' \
              "https://$public_host/ai/api/v1/analyze_session")"
            printf '%s' "$analysis_response" | grep --quiet '"history_id":"deployment-smoke"'

            trap - ERR
          REMOTE

      - name: 외부 공개 API 스모크 테스트
        run: |
          set -euo pipefail
          public_host="${{ secrets.LIGHTSAIL_HOST }}.sslip.io"
          base_url="https://$public_host"

          curl --fail --silent --show-error --retry 20 --retry-all-errors --retry-delay 3 \
            "$base_url/v3/api-docs" > /dev/null
          curl --fail --silent --show-error --retry 20 --retry-all-errors --retry-delay 3 \
            "$base_url/ai/health" > /dev/null

          analysis_response="$(curl --fail --silent --show-error --retry 20 --retry-all-errors --retry-delay 3 \
            --request POST \
            --header 'Content-Type: application/json' \
            --data '{"history_id":"external-deployment-smoke"}' \
            "$base_url/ai/api/v1/analyze_session")"
          printf '%s' "$analysis_response" | grep --quiet '"history_id":"external-deployment-smoke"'

          redirect_url="$(curl --silent --show-error --output /dev/null --write-out '%{redirect_url}' \
            "http://$public_host/ai/health")"
          [ "$redirect_url" = "$base_url/ai/health" ]
