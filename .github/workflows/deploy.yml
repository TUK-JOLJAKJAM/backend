name: ci-cd-lightsail

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: AI 서버 체크아웃
        uses: actions/checkout@v4
        with:
          repository: TUK-JOLJAKJAM/refit-ai-server
          ref: main
          path: refit-ai-server

      - name: 이미지 경로 소문자 생성
        run: |
          echo "GHCR_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "GHCR_REPO_LC=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "AI_IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/refit-ai-server" >> $GITHUB_ENV
          echo "AI_COMMIT_SHA=$(git -C refit-ai-server rev-parse HEAD)" >> $GITHUB_ENV

      - name: JDK 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: refit-ai-server/requirements.txt

      - name: AI 서버 테스트
        working-directory: refit-ai-server
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pytest -q

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ env.GHCR_OWNER_LC }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 도커 이미지 빌드/푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: AI 서버 이미지 빌드/푸시
        uses: docker/build-push-action@v6
        with:
          context: ./refit-ai-server
          file: ./refit-ai-server/Dockerfile
          push: true
          tags: |
            ${{ env.AI_IMAGE_NAME }}:${{ env.AI_COMMIT_SHA }}
            ${{ env.AI_IMAGE_NAME }}:latest

      - name: SSH 키 설정
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: 서버에 배포 파일 업로드
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} "mkdir -p ~/refit/nginx"
          scp -o StrictHostKeyChecking=no docker-compose.prod.yml ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/refit/docker-compose.prod.yml
          scp -o StrictHostKeyChecking=no nginx/default.conf ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/refit/nginx/default.conf

      - name: .env 생성
        run: |
          cat > .env <<EOF
          GHCR_OWNER=${{ env.GHCR_OWNER_LC }}
          GHCR_REPO=${{ env.GHCR_REPO_LC }}
          APP_IMAGE_TAG=${{ github.sha }}
          AI_IMAGE_TAG=${{ env.AI_COMMIT_SHA }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}
          EOF

      - name: 서버로 .env 업로드
        run: |
          scp -o StrictHostKeyChecking=no .env ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/refit/.env

      - name: 서버에서 compose 재기동
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} 'bash -se' <<'REMOTE'
            set -euo pipefail
            cd ~/refit

            chmod 600 .env

            docker login ghcr.io -u "$(grep -E '^GHCR_OWNER=' .env | cut -d= -f2)" -p "$(grep -E '^GHCR_TOKEN=' .env | cut -d= -f2)"

            docker compose --env-file .env -f docker-compose.prod.yml pull
            docker compose --env-file .env -f docker-compose.prod.yml up -d

            echo "Nginx 설정 검증 및 무중단 재적용"
            docker compose --env-file .env -f docker-compose.prod.yml exec -T nginx nginx -t
            docker compose --env-file .env -f docker-compose.prod.yml exec -T nginx nginx -s reload

            echo "AI 서버 준비 상태 확인"
            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error http://127.0.0.1/ai/health; then
                echo
                echo "AI 서버 배포 확인 완료"
                break
              fi

              if [ "$attempt" -eq 30 ]; then
                docker compose --env-file .env -f docker-compose.prod.yml logs --tail=100 ai nginx
                exit 1
              fi

              sleep 5
            done

            echo "백엔드와 AI 분석 연결 스모크 테스트"
            curl --fail --silent --show-error http://127.0.0.1/v3/api-docs > /dev/null
            analysis_response="$(curl --fail --silent --show-error \
              --request POST \
              --header 'Content-Type: application/json' \
              --data '{"history_id":"deployment-smoke"}' \
              http://127.0.0.1/ai/api/v1/analyze_session)"
            printf '%s' "$analysis_response" | grep --quiet '"history_id":"deployment-smoke"'
            echo "백엔드와 AI 분석 스모크 테스트 완료"

            docker image prune -f
          REMOTE
