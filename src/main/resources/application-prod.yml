server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,https://tuk-joljakjam.github.io}
  jwt:
    secret: ${JWT_SECRET}
    access-token-exp-seconds: 3600
    refresh-token-exp-seconds: 1209600

logging:
  level:
    org.hibernate.SQL: warn
